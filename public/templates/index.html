<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Library</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Inline Video Player -->
        <div id="playerSection" class="player-section hidden">
            <div class="player-header">
                <div class="player-info">
                    <h2 id="playerTitle"></h2>
                    <p id="playerChannel" class="player-channel"></p>
                </div>
                <button id="closePlayer" class="btn-close-player" title="Close player">&times;</button>
            </div>
            <div class="video-wrapper">
                <video id="videoPlayer" class="video-player" preload="metadata">
                    Your browser does not support the video element.
                </video>
            </div>
            <div class="progress-row">
                <input type="range" id="progressBar" class="progress-bar" value="0" min="0" max="1000" step="1">
            </div>
            <div class="player-controls">
                <button id="playPauseBtn" class="control-btn" title="Play/Pause">▶</button>
                <span id="timeDisplay" class="time-display">0:00 / 0:00</span>
                <div class="volume-control">
                    <button id="muteBtn" class="control-btn" title="Mute/Unmute">🔊</button>
                    <input type="range" id="volumeBar" class="volume-bar" value="100" min="0" max="100">
                </div>
                <div class="speed-buttons">
                    <button id="speed1Btn" class="speed-btn active" data-speed="1">1×</button>
                    <button id="speed15Btn" class="speed-btn" data-speed="1.5">1.5×</button>
                    <button id="speed2Btn" class="speed-btn" data-speed="2">2×</button>
                </div>
                <div class="controls-spacer"></div>
                <button id="widthToggleBtn" class="control-btn" title="Toggle Full Width">↔</button>
                <button id="fullscreenBtn" class="control-btn" title="Fullscreen">⛶</button>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search videos by title or channel..." />
            <button id="searchBtn">Search</button>
            <button id="clearBtn" class="btn-secondary">Clear</button>
        </div>

        <div id="videoCount" class="video-count"></div>

        <div id="videoGrid" class="video-grid">
            <!-- Videos injected here -->
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading videos...</p>
        </div>

        <div id="noResults" class="no-results hidden">
            <p>No videos found.</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        let allVideos = [];
        let currentVideoId = null;

        document.addEventListener('DOMContentLoaded', () => {
            fetchVideos();
        });

        function fetchVideos(query = '') {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('videoGrid');
            const noResults = document.getElementById('noResults');

            loading.classList.remove('hidden');
            grid.classList.add('hidden');
            noResults.classList.add('hidden');

            let url = '/api/videos';
            if (query) {
                url += '?q=' + encodeURIComponent(query);
            }

            fetch(url)
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(videos => {
                    allVideos = videos || [];
                    loading.classList.add('hidden');
                    if (allVideos.length === 0) {
                        noResults.classList.remove('hidden');
                    } else {
                        grid.classList.remove('hidden');
                        renderVideos(allVideos);
                    }
                    document.getElementById('videoCount').textContent = allVideos.length + ' video' + (allVideos.length !== 1 ? 's' : '') + ' found';
                })
                .catch(err => {
                    console.error('Error fetching videos:', err);
                    loading.classList.add('hidden');
                    noResults.classList.remove('hidden');
                    document.getElementById('noResults').querySelector('p').textContent = 'Error loading videos: ' + err.message;
                });
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            const filteredVideos = currentVideoId
                ? videos.filter(v => v.id !== currentVideoId)
                : videos;
            filteredVideos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-thumbnail" onclick="playVideo('${v.id}')">
                        ${v.thumbnail ? '<img src="' + v.thumbnail + '" alt="' + escapeHtml(v.title) + '" loading="lazy">' : '<div class="thumbnail-placeholder">🎬</div>'}
                        <span class="duration-badge">${formatDuration(v.duration)}</span>
                        <div class="play-overlay"><span class="play-icon">▶</span></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title" onclick="playVideo('${v.id}')" style="cursor:pointer">${escapeHtml(v.title)}</h3>
                        <p class="video-channel">${escapeHtml(v.channel)}</p>
                        <div class="video-meta">
                            <span>${formatDate(v.date_added)}</span>
                            <span>${v.view_count || 0} views</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ---- Custom Video Player Logic ----

        const player = document.getElementById('videoPlayer');
        const playerSection = document.getElementById('playerSection');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const muteBtn = document.getElementById('muteBtn');
        const volumeBar = document.getElementById('volumeBar');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const widthToggleBtn = document.getElementById('widthToggleBtn');
        const closePlayer = document.getElementById('closePlayer');
        const container = document.querySelector('.container');
        let isFullWidth = true;

        function playVideo(id) {
            const video = allVideos.find(v => v.id === id);
            if (!video) return;

            currentVideoId = id;
            document.getElementById('playerTitle').textContent = video.title;
            document.getElementById('playerChannel').textContent = video.channel;
            player.src = '/videos/' + encodeURIComponent(video.id) + '.' + video.format;
            playerSection.classList.remove('hidden');
            playerSection.classList.add('full-width-player');
            container.classList.add('full-width');
            player.play();
            playPauseBtn.textContent = '⏸';
            renderVideos(allVideos);

            fetch('/api/videos/' + id + '/view', { method: 'POST' });
        }

        function closePlayerAndReset() {
            player.pause();
            player.src = '';
            currentVideoId = null;
            playerSection.classList.add('hidden');
            playerSection.classList.remove('full-width-player', 'constrained-player');
            container.classList.remove('full-width');
            isFullWidth = true;
            progressBar.value = 0;
            timeDisplay.textContent = '0:00 / 0:00';
            playPauseBtn.textContent = '▶';
            renderVideos(allVideos);
        }

        closePlayer.addEventListener('click', closePlayerAndReset);

        playPauseBtn.addEventListener('click', () => {
            if (player.paused) {
                player.play();
                playPauseBtn.textContent = '⏸';
            } else {
                player.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        player.addEventListener('click', () => {
            if (player.paused) {
                player.play();
                playPauseBtn.textContent = '⏸';
            } else {
                player.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        player.addEventListener('timeupdate', () => {
            if (player.duration) {
                progressBar.value = (player.currentTime / player.duration) * 1000;
                timeDisplay.textContent = formatTime(player.currentTime) + ' / ' + formatTime(player.duration);
            }
        });

        player.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = '0:00 / ' + formatTime(player.duration);
        });

        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 1000) * player.duration;
            player.currentTime = seekTime;
        });

        muteBtn.addEventListener('click', () => {
            player.muted = !player.muted;
            muteBtn.textContent = player.muted ? '🔇' : '🔊';
            volumeBar.value = player.muted ? 0 : Math.round(player.volume * 100);
        });

        volumeBar.addEventListener('input', () => {
            player.volume = volumeBar.value / 100;
            player.muted = false;
            muteBtn.textContent = player.volume === 0 ? '🔇' : '🔊';
        });

        // Speed buttons
        function setSpeed(speed, activeBtn) {
            player.playbackRate = speed;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        document.getElementById('speed1Btn').addEventListener('click', function() {
            setSpeed(1, this);
        });
        document.getElementById('speed15Btn').addEventListener('click', function() {
            setSpeed(1.5, this);
        });
        document.getElementById('speed2Btn').addEventListener('click', function() {
            setSpeed(2, this);
        });

        function applyPlayerWidth(full) {
            if (full) {
                playerSection.classList.add('full-width-player');
                playerSection.classList.remove('constrained-player');
                container.classList.add('full-width');
                const wrapper = document.querySelector('.video-wrapper');
                wrapper.classList.remove('constrained');
                widthToggleBtn.textContent = '↔';
                isFullWidth = true;
            } else {
                playerSection.classList.remove('full-width-player');
                playerSection.classList.add('constrained-player');
                container.classList.remove('full-width');
                const wrapper = document.querySelector('.video-wrapper');
                wrapper.classList.add('constrained');
                widthToggleBtn.textContent = '↕';
                isFullWidth = false;
            }
        }

        widthToggleBtn.addEventListener('click', () => {
            isFullWidth = !isFullWidth;
            applyPlayerWidth(isFullWidth);
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } else {
                if (playerSection.requestFullscreen) {
                    playerSection.requestFullscreen();
                } else if (playerSection.webkitRequestFullscreen) {
                    playerSection.webkitRequestFullscreen();
                } else if (playerSection.msRequestFullscreen) {
                    playerSection.msRequestFullscreen();
                }
            }
        });

        document.addEventListener('fullscreenchange', () => {
            const wrapper = document.querySelector('.video-wrapper');
            if (document.fullscreenElement) {
                wrapper.style.height = 'calc(100vh - 120px)';
                wrapper.style.maxHeight = 'none';
                playerSection.style.display = 'flex';
                playerSection.style.flexDirection = 'column';
                playerSection.style.height = '100vh';
                playerSection.style.padding = '1rem';
                playerSection.style.background = '#000';
                playerSection.style.borderRadius = '0';
                playerSection.style.border = 'none';
                fullscreenBtn.textContent = '⛶';
            } else {
                wrapper.style.height = '';
                wrapper.style.maxHeight = '';
                playerSection.style.display = '';
                playerSection.style.flexDirection = '';
                playerSection.style.height = '';
                playerSection.style.padding = '';
                playerSection.style.background = '';
                playerSection.style.borderRadius = '';
                playerSection.style.border = '';
                fullscreenBtn.textContent = '⛶';
            }
        });

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
            return m + ':' + String(s).padStart(2, '0');
        }

        // ---- Search ----

        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('searchInput').value.trim();
            fetchVideos(q);
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchVideos(e.target.value.trim());
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            fetchVideos();
        });

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) {
                return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
            return m + ':' + String(s).padStart(2, '0');
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
